# Prometheus alert rules for the Academic Journal backend.
# Scrape /actuator/prometheus on the backend pod and load this file as
# a rule_files entry in your Prometheus config:
#
#   rule_files:
#     - /etc/prometheus/rules/ajs-alerts.yml
#
# Severities follow the team's convention:
#   page    — wake someone up at night
#   ticket  — file a ticket the next business day
#   info    — surface in the dashboard, no notification

groups:
  - name: ajs-availability
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="ajs-backend"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "AJS backend is down"
          description: "Prometheus has not been able to scrape /actuator/prometheus on {{ $labels.instance }} for 2+ minutes."

      - alert: BackendReadinessFailing
        expr: rate(http_server_requests_seconds_count{uri="/actuator/health/readiness",status=~"5.."}[5m]) > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Readiness probe is failing"
          description: "Spring Boot's readiness probe is returning errors on {{ $labels.instance }}."

  - name: ajs-errors
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
          sum(rate(http_server_requests_seconds_count[5m])) > 0.02
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "5xx error rate above 2%"
          description: "More than 2% of HTTP responses are 5xx for the past 10 minutes."

      - alert: SlowEndpoint
        expr: histogram_quantile(0.95, sum by (uri, le) (rate(http_server_requests_seconds_bucket[5m]))) > 2
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "p95 latency above 2s on {{ $labels.uri }}"
          description: "Investigate slow handler or downstream call."

  - name: ajs-resources
    interval: 60s
    rules:
      - alert: JvmHeapNearLimit
        expr: |
          sum(jvm_memory_used_bytes{area="heap"}) / sum(jvm_memory_max_bytes{area="heap"}) > 0.9
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "JVM heap > 90%"
          description: "{{ $labels.instance }} is running with very little headroom — investigate before GC pressure spikes."

      - alert: HikariPoolSaturated
        expr: hikaricp_connections_active >= hikaricp_connections_max
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "Hikari connection pool saturated"
          description: "All DB connections in use — possible deadlock or slow query."

      - alert: ManyPendingDeposits
        expr: deposit_record_pending_count > 50
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "{{ $value }} CrossRef/ORCID deposits pending"
          description: "Deposit dispatcher is falling behind — check integration credentials and remote endpoint health."
