services:

  postgres:
    image: postgres:17-alpine
    container_name: aj-postgres
    environment:
      POSTGRES_DB: academic_journal
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal -d academic_journal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aj-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aj-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: aj-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set in .env}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin $$S3_SECRET_KEY;
      mc mb -p local/academic-journal || true;
      mc anonymous set download local/academic-journal/public || true;
      exit 0;
      "

  keycloak-realm-init:
    image: alpine:3.20
    container_name: aj-keycloak-realm-init
    environment:
      KC_USER_ADMIN_PASSWORD: ${KC_USER_ADMIN_PASSWORD:?KC_USER_ADMIN_PASSWORD must be set in .env}
      KC_USER_EDITOR_PASSWORD: ${KC_USER_EDITOR_PASSWORD:?KC_USER_EDITOR_PASSWORD must be set in .env}
      KC_USER_REVIEWER_PASSWORD: ${KC_USER_REVIEWER_PASSWORD:?KC_USER_REVIEWER_PASSWORD must be set in .env}
      KC_USER_AUTHOR_PASSWORD: ${KC_USER_AUTHOR_PASSWORD:?KC_USER_AUTHOR_PASSWORD must be set in .env}
    volumes:
      - ./infra/keycloak/realm:/tpl:ro
      - keycloak-realm-imports:/out
    command: |
      sh -c "
        set -e
        apk add --no-cache gettext > /dev/null
        envsubst '
          $$KC_USER_ADMIN_PASSWORD
          $$KC_USER_EDITOR_PASSWORD
          $$KC_USER_REVIEWER_PASSWORD
          $$KC_USER_AUTHOR_PASSWORD
        ' < /tpl/academic-journal-realm.json.tpl > /out/academic-journal-realm.json
        echo 'realm import file generated'
      "

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: aj-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set in .env}
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - keycloak-realm-imports:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-realm-init:
        condition: service_completed_successfully

  mailpit:
    image: axllent/mailpit:latest
    container_name: aj-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres-data:
  redis-data:
  minio-data:
  keycloak-realm-imports:
