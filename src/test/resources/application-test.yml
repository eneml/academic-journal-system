spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
  datasource:
    # @ServiceConnection (Testcontainers) overrides this at runtime;
    # placeholder satisfies the property binder during context init.
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  docker:
    compose:
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/test

app:
  storage:
    s3:
      secret-key: test

logging:
  level:
    root: WARN
    com.eneml.ajs: INFO
    org.springframework.modulith: INFO
