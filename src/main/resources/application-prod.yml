spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  docker:
    compose:
      enabled: false

logging:
  level:
    root: WARN
    com.eneml.ajs: INFO

management:
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 0.05

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
