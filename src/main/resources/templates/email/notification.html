<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${subject}">Notification</title>
</head>
<body style="margin:0;background:#f5f4f0;font-family:Inter,system-ui,-apple-system,sans-serif;color:#1a1a1a;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f5f4f0;padding:32px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" width="560" style="background:#ffffff;border:1px solid #e6e3da;border-radius:6px;">
                    <tr>
                        <td style="padding:28px 32px 16px;border-bottom:1px solid #e6e3da;">
                            <p style="margin:0;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#1844c4;font-weight:600;"
                               th:text="${journalName}">Academic Journal</p>
                            <h1 style="margin:6px 0 0;font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:22px;line-height:1.25;color:#0e0e10;"
                                th:text="${title}">Title</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px 32px 8px;">
                            <p style="margin:0;font-family:'Source Serif 4','Source Serif Pro',Georgia,serif;font-size:15px;line-height:1.6;color:#3a3a3a;"
                               th:text="${body}">Body</p>
                        </td>
                    </tr>
                    <tr th:if="${actionUrl}">
                        <td style="padding:8px 32px 28px;">
                            <a th:href="${actionUrl}"
                               style="display:inline-block;padding:10px 18px;background:#1844c4;color:#ffffff;text-decoration:none;border-radius:4px;font-size:13px;font-weight:500;">
                                Open in editorial app
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:18px 32px 24px;border-top:1px solid #e6e3da;color:#7a7a7a;font-size:11px;">
                            <p style="margin:0;">You received this because you have a relevant role in <span th:text="${journalName}">the journal</span>.</p>
                            <p style="margin:6px 0 0;">Manage your notification preferences in your profile.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
