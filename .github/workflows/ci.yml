name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 25 + Maven + Testcontainers)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Verify (compile + tests via Testcontainers)
        run: mvn -B -ntp verify
        env:
          # Testcontainers spins up its own Postgres per test class via @ServiceConnection;
          # nothing needed here besides Docker, which the runner has out of the box.
          MAVEN_OPTS: "-Xmx2g"

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  frontend:
    name: Frontend (pnpm + turbo)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm -r --if-present run type-check

      # Lint step intentionally skipped until ESLint is properly installed
      # at the workspace root (@ajs/eslint-config peer-depends on eslint^9
      # but the runtime is not yet wired). Tracked as a follow-up.

      - name: Build (turbo)
        run: pnpm build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_PUBLIC_SITE_URL: https://example.org

  modulith-check:
    name: Modulith dependency check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: Verify Modulith boundaries
        run: mvn -B -ntp -Dtest='ModularityTests' test
